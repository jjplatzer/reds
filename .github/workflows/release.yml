name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9]+(\.[A-Za-z0-9]+)*)?$ ]]; then
            echo "Invalid REDS release tag: $TAG" >&2
            echo "Expected x.y.z or x.y.z-prerelease, e.g. 0.1.0 or 0.1.0-beta.1" >&2
            exit 1
          fi
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Release tag $TAG does not match VERSION file $VERSION" >&2
            exit 1
          fi

          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  build-macos-release:
    runs-on: macos-latest
    needs: validate-tag

    env:
      CGO_ENABLED: '1'
      MACOSX_DEPLOYMENT_TARGET: '13.4'
      CGO_CFLAGS: '-mmacosx-version-min=13.4'
      CGO_LDFLAGS: '-mmacosx-version-min=13.4'
      REDS_VERSION: ${{ needs.validate-tag.outputs.version }}
      REDS_COMMIT: ${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install macOS native dependencies
        run: |
          brew update
          brew install pkg-config glfw

      - name: Download Go modules
        run: go mod download

      - name: Run Go tests
        run: go test -v ./...

      - name: Build macOS release package
        run: ./build.sh --package

      - name: Audit native dependencies
        run: |
          set -euo pipefail

          BINARY="build/REDS.app/Contents/MacOS/reds"
          otool -L "$BINARY"

          invalid="$(
            otool -L "$BINARY" |
            tail -n +2 |
            awk '{print $1}' |
            grep '^/' |
            grep -Ev '^/System/Library/|^/usr/lib/' \
            || true
          )"

          if [[ -n "$invalid" ]]; then
            echo "Non-system absolute dependencies:" >&2
            echo "$invalid" >&2
            exit 1
          fi

      - name: Validate macOS checksum
        run: shasum -a 256 -c build/REDS-*-macOS.zip.sha256

      - name: Upload macOS release package
        uses: actions/upload-artifact@v4
        with:
          name: REDS-macOS-release
          path: |
            build/REDS-*-macOS.zip
            build/REDS-*-macOS.zip.sha256
          if-no-files-found: error

  build-windows-release:
    runs-on: windows-latest
    needs: validate-tag

    env:
      CGO_ENABLED: '1'
      REDS_VERSION: ${{ needs.validate-tag.outputs.version }}
      REDS_COMMIT: ${{ github.sha }}

    steps:
      - name: Disable Git line ending conversion
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up MSYS2 MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glfw

      - name: Configure MSYS2 UCRT64 toolchain
        shell: pwsh
        run: |
          $candidateBins = @(
            "C:\msys64\ucrt64\bin",
            "C:\tools\msys64\ucrt64\bin",
            "$env:RUNNER_TEMP\msys64\ucrt64\bin"
          )

          $ucrtBin = $candidateBins |
            Where-Object { Test-Path (Join-Path $_ "gcc.exe") } |
            Select-Object -First 1

          if (-not $ucrtBin) {
            Write-Error "MSYS2 UCRT64 gcc.exe was not found"
            exit 1
          }

          "MSYS2_UCRT64_BIN=$ucrtBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC=$ucrtBin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=$ucrtBin\g++.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PKG_CONFIG=$ucrtBin\pkg-config.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $ucrtBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download Go modules
        shell: pwsh
        run: go mod download

      - name: Run Go tests
        shell: pwsh
        run: go test -v ./...

      - name: Build Windows release package
        shell: pwsh
        run: |
          .\build.bat --package

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Validate Windows checksum
        shell: pwsh
        run: |
          Write-Host "Build directory:"
          Get-ChildItem "build" -Force | Format-Table Name, Length

          $Archive = Get-ChildItem "build" -Filter "REDS-*-Windows.zip" |
            Select-Object -First 1
          $Checksum = Get-ChildItem "build" -Filter "REDS-*-Windows.zip.sha256" |
            Select-Object -First 1

          if (-not $Archive -or -not $Checksum) {
            throw "Missing Windows release archive or checksum."
          }

          $Expected = Get-Content $Checksum.FullName
          $Hash = (Get-FileHash $Archive.FullName -Algorithm SHA256).Hash.ToLower()
          if ($Expected -notmatch $Hash) {
            throw "Checksum did not match $($Archive.Name)"
          }

      - name: Upload Windows release package
        uses: actions/upload-artifact@v4
        with:
          name: REDS-Windows-release
          path: |
            build/REDS-*-Windows.zip
            build/REDS-*-Windows.zip.sha256
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - build-macos-release
      - build-windows-release

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show release artifacts
        run: find dist -maxdepth 3 -type f -print

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.version }}
          name: REDS ${{ needs.validate-tag.outputs.version }}
          prerelease: ${{ needs.validate-tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.sha256

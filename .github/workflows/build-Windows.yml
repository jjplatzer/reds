name: build-Windows

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      run_gui_smoke:
        description: >
          Launch the packaged REDS application for 10 seconds.
        required: false
        default: false
        type: boolean

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    env:
      CGO_ENABLED: '1'

    steps:
      - name: Disable Git line ending conversion
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up MSYS2 MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glfw

      - name: Configure MSYS2 UCRT64 toolchain
        shell: pwsh
        run: |
          $candidateBins = @(
            "C:\msys64\ucrt64\bin",
            "C:\tools\msys64\ucrt64\bin",
            "$env:RUNNER_TEMP\msys64\ucrt64\bin"
          )

          $ucrtBin = $candidateBins |
            Where-Object { Test-Path (Join-Path $_ "gcc.exe") } |
            Select-Object -First 1

          if (-not $ucrtBin) {
            Write-Host "Searching for MSYS2 UCRT64 gcc.exe..."
            $searchRoots = @("C:\msys64", "C:\tools\msys64", "$env:RUNNER_TEMP")
            foreach ($root in $searchRoots) {
              if (-not (Test-Path $root)) {
                continue
              }

              $gcc = Get-ChildItem -Path $root -Filter gcc.exe -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match '\\ucrt64\\bin\\gcc\.exe$' } |
                Select-Object -First 1

              if ($gcc) {
                $ucrtBin = $gcc.DirectoryName
                break
              }
            }
          }

          if (-not $ucrtBin) {
            Write-Error "MSYS2 UCRT64 gcc.exe was not found"
            exit 1
          }

          "MSYS2_UCRT64_BIN=$ucrtBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CC=$ucrtBin\gcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=$ucrtBin\g++.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PKG_CONFIG=$ucrtBin\pkg-config.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $ucrtBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Write-Host "Using MSYS2 UCRT64 bin: $ucrtBin"

      - name: Show tool versions
        shell: pwsh
        run: |
          go version
          & $env:CC --version
          & $env:CXX --version
          & $env:PKG_CONFIG --version
          & $env:PKG_CONFIG --modversion glfw3

      - name: Download Go modules
        shell: pwsh
        run: go mod download

      - name: Check Go formatting
        shell: pwsh
        run: |
          $files = gofmt -l .
          if ($files) {
            Write-Error "The following Go files need gofmt:`n$($files -join "`n")"
            exit 1
          }

      - name: Run Go tests
        shell: pwsh
        run: go test -v ./...

      - name: Build portable REDS Windows application
        shell: pwsh
        run: |
          .\build.bat --package

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Validate Windows application
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $Root = "build\REDS-Windows"

          Write-Host "Build directory:"
          Get-ChildItem "build" -Force | Format-Table Name, Length

          $Archive = Get-ChildItem "build" -Filter "REDS-*-Windows.zip" |
            Select-Object -First 1
          $Checksum = Get-ChildItem "build" -Filter "REDS-*-Windows.zip.sha256" |
            Select-Object -First 1

          if (-not $Archive) {
            throw "Missing versioned Windows archive."
          }
          if (-not $Checksum) {
            throw "Missing Windows archive checksum."
          }

          $Required = @(
            "$Root\REDS.exe",
            "$Root\resources\videomaps\asdex",
            "$Root\resources\configs\asdex",
            "$Root\resources\audio\asdex",
            "$Root\fonts",
            "$Root\asdex\surface",
            "$Root\LICENSE.txt",
            $Archive.FullName,
            $Checksum.FullName
          )

          foreach ($Path in $Required) {
            if (-not (Test-Path $Path)) {
              throw "Missing build output: $Path"
            }
          }

          $Version = (Get-Item "$Root\REDS.exe").VersionInfo

          Write-Host "Product: $($Version.ProductName)"
          Write-Host "Version: $($Version.ProductVersion)"

          if ($Version.ProductName -ne "REDS") {
            throw "REDS Windows resources were not embedded."
          }

          Get-ChildItem $Root | Format-Table Name, Length

          $Expected = Get-Content $Checksum.FullName
          $Hash = (Get-FileHash $Archive.FullName -Algorithm SHA256).Hash.ToLower()
          if ($Expected -notmatch $Hash) {
            throw "Checksum did not match $($Archive.Name)"
          }

      - name: Optional packaged GUI smoke test
        if: >
          github.event_name == 'workflow_dispatch' &&
          inputs.run_gui_smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $Application = (Resolve-Path "build\REDS-Windows\REDS.exe").Path
          $WorkingDirectory = Split-Path $Application

          # Remove MSYS2 from PATH so missing bundled DLLs are exposed.
          $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"

          $Process = Start-Process `
            -FilePath $Application `
            -WorkingDirectory $WorkingDirectory `
            -PassThru

          Start-Sleep -Seconds 10

          $Process.Refresh()

          if ($Process.HasExited) {
            Write-Host "REDS exited with code $($Process.ExitCode)"

            $Log = Join-Path $env:APPDATA "REDS\reds.slog"
            if (Test-Path $Log) {
              Write-Host "=== reds.slog ==="
              Get-Content $Log
            }

            throw "REDS exited during the GUI smoke test."
          }

          Stop-Process -Id $Process.Id -Force

          Write-Host "Packaged REDS remained alive for 10 seconds."

      - name: Upload REDS Windows application
        uses: actions/upload-artifact@v4
        with:
          name: REDS-Windows
          path: |
            build/REDS-*-Windows.zip
            build/REDS-*-Windows.zip.sha256
          if-no-files-found: error

name: build-macOS

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      run_gui_smoke:
        description: 'Try launching the GLFW app for 10 seconds on the macOS runner. Usually leave this off; CI mainly validates build/linking.'
        required: false
        default: false
        type: boolean

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    env:
      CGO_ENABLED: '1'
      MACOSX_DEPLOYMENT_TARGET: '13.4'
      CGO_CFLAGS: '-mmacosx-version-min=13.4'
      CGO_LDFLAGS: '-mmacosx-version-min=13.4'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install macOS native dependencies
        run: |
          brew update
          brew install pkg-config glfw

      - name: Show tool versions
        run: |
          go version
          clang --version
          pkg-config --modversion glfw3 || true

      - name: Download Go modules
        run: go mod download

      - name: Check Go formatting
        run: |
          if [ "$(gofmt -l . | wc -l | tr -d ' ')" -gt 0 ]; then
            echo "The following Go files need gofmt:" >&2
            gofmt -l . >&2
            exit 1
          fi

      - name: Run Go tests
        run: go test -v ./...

      - name: Build REDS.app
        run: ./build.sh --package

      - name: Validate REDS.app
        run: |
          set -euo pipefail

          APP="build/REDS.app"
          CONTENTS="$APP/Contents"
          BINARY="$CONTENTS/MacOS/reds"
          RESOURCES="$CONTENTS/Resources"

          plutil -lint \
            "$CONTENTS/Info.plist"

          test -x \
            "$BINARY"

          test -f \
            "$RESOURCES/reds.icns"

          test -d \
            "$RESOURCES/resources/videomaps/asdex"

          test -d \
            "$RESOURCES/resources/configs/asdex"

          test -d \
            "$RESOURCES/resources/audio/asdex"

          test -d \
            "$RESOURCES/fonts"

          test -d \
            "$RESOURCES/asdex/surface"

          file \
            "$BINARY"

          du -sh \
            "$APP"

      - name: Audit native dependencies
        run: |
          set -euo pipefail

          BINARY="build/REDS.app/Contents/MacOS/reds"

          otool -L "$BINARY"

          invalid="$(
            otool -L "$BINARY" |
            tail -n +2 |
            awk '{print $1}' |
            grep '^/' |
            grep -Ev '^/System/Library/|^/usr/lib/' \
            || true
          )"

          if [[ -n "$invalid" ]]; then
            echo "Non-system absolute dependencies:" >&2
            echo "$invalid" >&2
            exit 1
          fi

      - name: Validate macOS archive
        run: |
          set -euo pipefail

          ls -lh \
            build/REDS-*-macOS.zip \
            build/REDS-*-macOS.zip.sha256

          shasum \
            -a 256 \
            -c \
            build/REDS-*-macOS.zip.sha256

      - name: Optional GUI smoke launch
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gui_smoke }}
        run: |
          set -euo pipefail

          open \
            build/REDS.app

          sleep 10

          if pgrep -x reds >/dev/null; then
            echo "REDS.app stayed alive for 10 seconds."
            pkill -x reds || true
          else
            echo "REDS.app is no longer running." >&2

            LOG="$HOME/Library/Application Support/REDS/reds.slog"

            if [[ -f "$LOG" ]]; then
              echo "=== REDS slog ==="
              cat "$LOG"
            fi

            exit 1
          fi

      - name: Upload REDS macOS application
        uses: actions/upload-artifact@v4
        with:
          name: REDS-macOS
          path: |
            build/REDS-*-macOS.zip
            build/REDS-*-macOS.zip.sha256
          if-no-files-found: error
